<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Deps Viewer</title>
        <link rel="icon" type="image/x-icon" href="image/favicon.ico" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    <body>
        <div class="wrap" x-data="packagesData()">
            <!-- Header -->
            <header>
                <div class="logo">
                    <div class="logo-icon">{}}</div>
                    <h1>Deps<span style="opacity: 0.4">Viewer</span></h1>
                </div>
                <p class="subtitle">// paste or upload your composer.json &amp; package.json → get clean dependency info</p>
            </header>

            <!-- Input panels -->

            <div class="input-grid">
                <div class="panel">
                    <div class="panel-header">
                        <span class="badge badge-php">PHP</span>
                        <span class="panel-title">composer.json</span>
                    </div>
                    <textarea x-model="composerJson" placeholder='{"require": {"laravel/framework": "^11.0", "spatie/permission": "^6.0"}, "require-dev": {"phpunit/phpunit": "^11.0"}}' spellcheck="false"></textarea>
                    <input @change="handleFileSelect" type="file" id="composerUpload" accept=".json" />
                </div>
                <div class="panel npm">
                    <div class="panel-header">
                        <span class="badge badge-npm">NPM</span>
                        <span class="panel-title">package.json</span>
                    </div>
                    <textarea x-model="packageJson" placeholder='{"dependencies": {"axios": "^1.6.0", "vue": "^3.4.0"}, "devDependencies": {"vite": "^5.0.0"}}' spellcheck="false"></textarea>
                    <input @change="handleFileSelect" type="file" id="packageUpload" accept=".json" />
                </div>
            </div>

            <!-- Action row -->
            <div class="action-row">
                <button type="button" class="btn-analyze" @click="analyze()" :disabled="loading">
                    <template x-if="!loading">
                        <span>▶ Analyze</span>
                    </template>
                    <template x-if="loading">
                        <span style="display: flex; align-items: center; gap: 6px">
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                        </span>
                    </template>
                </button>
                <button class="btn-clear" @click="clear()" x-show="phpPackages.length || npmPackages.length">Clear</button>
                <span class="status-msg" x-show="loading" x-text="statusMsg"></span>
            </div>

            <!-- Error -->
            <div class="error-box" x-show="error" x-text="error"></div>

            <!-- Progress -->
            <div class="progress-wrap" x-show="loading">
                <div class="progress-bar" :style="`width: ${progress}%`"></div>
            </div>

            <!-- Results -->
            <div x-show="phpPackages.length || npmPackages.length">
                <div>
                    <!-- Stats -->
                    <div class="stats-bar">
                        <div class="stat" x-show="phpPackages.length">
                            <span class="stat-val php" x-text="phpPackages.length"></span>
                            <span class="stat-label">PHP packages</span>
                        </div>
                        <div class="stat" x-show="phpDevPackages.length">
                            <span class="stat-val" style="color: #fbbf24" x-text="phpDevPackages.length"></span>
                            <span class="stat-label">PHP dev</span>
                        </div>
                        <div class="stat" x-show="npmPackages.length">
                            <span class="stat-val npm" x-text="npmPackages.length"></span>
                            <span class="stat-label">NPM packages</span>
                        </div>
                        <div class="stat" x-show="npmDevPackages.length">
                            <span class="stat-val" style="color: #fbbf24" x-text="npmDevPackages.length"></span>
                            <span class="stat-label">NPM dev</span>
                        </div>
                    </div>

                    <!-- Tabs -->
                    <div class="tabs">
                        <button class="tab" :class="activeTab === 'php' ? 'active-php' : ''" @click="activeTab = 'php'; searchQ = ''" x-show="phpPackages.length">PHP / Composer</button>
                        <button class="tab" :class="activeTab === 'npm' ? 'active-npm' : ''" @click="activeTab = 'npm'; searchQ = ''" x-show="npmPackages.length">NPM / Node</button>

                        <!-- Export buttons -->
                        <div class="tabs-actions" style="margin-left: auto; display: flex; gap: 8px">
                            <button class="btn-export" @click="exportPhpToPdf()" x-show="phpPackages.length > 0 && activeTab === 'php'" title="Export PHP Dependencies to PDF">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                PHP PDF
                            </button>
                            <button class="btn-export" @click="exportNpmToPdf()" x-show="npmPackages.length > 0 && activeTab === 'npm'" title="Export NPM Dependencies to PDF">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                NPM PDF
                            </button>
                        </div>
                    </div>

                    <!-- Filter row -->
                    <div class="filter-row">
                        <input type="text" class="search-box" :class="activeTab" placeholder="Search packages..." x-model="searchQ" />
                        <button class="filter-chip" :class="devFilter === 'all' ? (activeTab === 'php' ? 'active-php' : 'active-npm') : ''" @click="devFilter = 'all'">All</button>
                        <button class="filter-chip" :class="devFilter === 'prod' ? (activeTab === 'php' ? 'active-php' : 'active-npm') : ''" @click="devFilter = 'prod'">Prod</button>
                        <button class="filter-chip" :class="devFilter === 'dev' ? (activeTab === 'php' ? 'active-php' : 'active-npm') : ''" @click="devFilter = 'dev'">Dev</button>
                    </div>

                    <!-- Cards -->
                    <div class="pkg-grid" x-show="activeTab === 'php'" x-cloak>
                        <template x-for="(pkg, i) in filteredPhp" :key="pkg.name">
                            <div class="pkg-card" :style="`animation-delay: ${i * 30}ms`">
                                <div>
                                    <div class="pkg-name">
                                        <a :href="`https://packagist.org/packages/${pkg.name}`" target="_blank" x-text="pkg.name"></a>
                                    </div>
                                    <template x-if="pkg.loading">
                                        <div class="skeleton-desc"></div>
                                    </template>
                                    <template x-if="!pkg.loading">
                                        <div>
                                            <div class="pkg-desc" x-text="pkg.description || 'No description available'"></div>
                                            <a x-show="pkg.gitlab" :href="pkg.gitlab" target="_blank" class="pkg-github">GitHub →</a>
                                        </div>
                                    </template>
                                    <div class="pkg-meta">
                                        <span class="ver-required" x-text="'requires: ' + pkg.required"></span>
                                        <span class="ver-installed php" x-show="pkg.version" x-text="pkg.version"></span>
                                    </div>
                                </div>
                                <div class="pkg-right">
                                    <span class="dev-badge" x-show="pkg.dev">dev</span>
                                </div>
                            </div>
                        </template>
                        <div class="empty-state" x-show="filteredPhp.length === 0">
                            <div class="icon">🔍</div>
                            No PHP packages match your filter
                        </div>
                    </div>

                    <div class="pkg-grid" x-show="activeTab === 'npm'" x-cloak>
                        <template x-for="(pkg, i) in filteredNpm" :key="pkg.name">
                            <div class="pkg-card" :style="`animation-delay: ${i * 30}ms`">
                                <div>
                                    <div class="pkg-name npm">
                                        <a :href="`https://www.npmjs.com/package/${pkg.name}`" target="_blank" x-text="pkg.name"></a>
                                    </div>
                                    <template x-if="pkg.loading">
                                        <div class="skeleton-desc"></div>
                                    </template>
                                    <template x-if="!pkg.loading">
                                        <div>
                                            <div class="pkg-desc" x-text="pkg.description || 'No description available'"></div>
                                            <a x-show="pkg.gitlab" :href="pkg.gitlab" target="_blank" class="pkg-github">GitHub →</a>
                                        </div>
                                    </template>
                                    <div class="pkg-meta">
                                        <span class="ver-required" x-text="'requires: ' + pkg.required"></span>
                                        <span class="ver-installed npm" x-show="pkg.version" x-text="pkg.version"></span>
                                    </div>
                                </div>
                                <div class="pkg-right">
                                    <span class="dev-badge" x-show="pkg.dev">dev</span>
                                </div>
                            </div>
                        </template>
                        <div class="empty-state" x-show="filteredNpm.length === 0">
                            <div class="icon">🔍</div>
                            No NPM packages match your filter
                        </div>
                    </div>
                </div>
            </div>

            <!-- Welcome state -->
            <template x-if="!phpPackages.length && !npmPackages.length && !loading && !error">
                <div class="empty-state">
                    <div class="icon">📦</div>
                    Paste or upload your
                    <code style="color: var(--accent-php)">composer.json</code>
                    and/or
                    <code style="color: var(--accent-npm)">package.json</code>
                    above and click Analyze
                </div>
            </template>

            <footer>
                <p>
                    ©
                    <span x-text="new Date().getFullYear()"></span>
                    DepsViewer
                    <span x-text="`v${APP_VERSION}`"></span>
                </p>
            </footer>
        </div>

        <script src="js/app.js" type="module"></script>
        <script>
            document.addEventListener('alpine:init', () => {
                Alpine.data('packagesData', () => ({
                    composerJson: '',
                    packageJson: '',
                    phpPackages: [],
                    npmPackages: [],
                    activeTab: 'php',
                    searchQ: '',
                    devFilter: 'all',
                    loading: false,
                    error: '',
                    progress: 0,
                    statusMsg: '',

                    get phpDevPackages() {
                        return this.phpPackages.filter((p) => p.dev);
                    },
                    get npmDevPackages() {
                        return this.npmPackages.filter((p) => p.dev);
                    },
                    get filteredPhp() {
                        return this.phpPackages.filter((p) => {
                            const q = this.searchQ.toLowerCase();
                            const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
                            const matchDev = this.devFilter === 'all' || (this.devFilter === 'dev' ? p.dev : !p.dev);
                            return matchSearch && matchDev;
                        });
                    },
                    get filteredNpm() {
                        return this.npmPackages.filter((p) => {
                            const q = this.searchQ.toLowerCase();
                            const matchSearch = !q || p.name.toLowerCase().includes(q) || (p.description || '').toLowerCase().includes(q);
                            const matchDev = this.devFilter === 'all' || (this.devFilter === 'dev' ? p.dev : !p.dev);
                            return matchSearch && matchDev;
                        });
                    },

                    handleFileSelect(event) {
                        this.error = '';

                        this.progress = 0;
                        const file = event.target.files[0];
                        const inputId = event.target.id;

                        if (!file) return;

                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                const jsonData = JSON.parse(e.target.result);

                                if (inputId === 'composerUpload') {
                                    this.phpPackages = [];
                                    if (file.name.toLowerCase() !== 'composer.json') {
                                        this.error = 'Please upload a valid composer.json file.';
                                        return;
                                    }
                                    this.composerJson = JSON.stringify(jsonData, null, 2);
                                } else if (inputId === 'packageUpload') {
                                    this.npmPackages = [];
                                    if (file.name.toLowerCase() !== 'package.json') {
                                        this.error = 'Please upload a valid package.json file.';
                                        return;
                                    }
                                    this.npmPackages = [];
                                    this.packageJson = JSON.stringify(jsonData, null, 2);
                                }
                            } catch (error) {
                                console.error('Invalid JSON file.', error);
                            }
                        };
                        reader.readAsText(file);
                        event.target.value = '';
                    },

                    clear() {
                        this.phpPackages = [];
                        this.npmPackages = [];
                        this.error = '';
                        this.composerJson = '';
                        this.packageJson = '';
                        this.progress = 0;
                    },

                    exportPhpToPdf() {
                        this.generatePdf('PHP Dependencies', this.phpPackages);
                    },

                    exportNpmToPdf() {
                        this.generatePdf('NPM Dependencies', this.npmPackages);
                    },

                    generatePdf(title, packages) {
                        const doc = new jsPDF();
                        const date = new Date().toLocaleDateString();

                        doc.setFontSize(18);
                        doc.text(title, 14, 20);
                        doc.setFontSize(10);
                        doc.setTextColor(100);
                        doc.text(`Generated on ${date}`, 14, 26);

                        const tableData = packages.map((pkg) => [pkg.name, pkg.required, pkg.version || 'N/A', pkg.dev ? 'Dev' : 'Prod', (pkg.description || 'No description').substring(0, 80) + (pkg.description?.length > 80 ? '...' : '')]);

                        autoTable(doc, {
                            startY: 32,
                            head: [['Package', 'Required', 'Installed', 'Type', 'Description']],
                            body: tableData,
                            theme: 'striped',
                            headStyles: {
                                fillColor: [40, 45, 55],
                            },
                            styles: {
                                fontSize: 9,
                            },
                            columnStyles: {
                                4: {
                                    cellWidth: 60,
                                },
                            },
                        });

                        doc.save(`${title.toLowerCase().replace(' ', '-')}.pdf`);
                    },

                    async analyze() {
                        if (this.loading) return;

                        this.error = '';
                        this.phpPackages = [];
                        this.npmPackages = [];
                        this.progress = 0;

                        var phpEntries = [];
                        var npmEntries = [];

                        // Parse composer.json
                        if (this.composerJson.trim()) {
                            try {
                                const data = JSON.parse(this.composerJson);
                                const req = data.require || {};
                                const reqDev = data['require-dev'] || {};
                                for (const [name, version] of Object.entries(req)) {
                                    if (name === 'php' || name.startsWith('ext-')) continue;
                                    phpEntries.push({
                                        name,
                                        required: version,
                                        dev: false,
                                    });
                                }
                                for (const [name, version] of Object.entries(reqDev)) {
                                    if (name === 'php' || name.startsWith('ext-')) continue;
                                    phpEntries.push({
                                        name,
                                        required: version,
                                        dev: true,
                                    });
                                }
                            } catch {
                                this.error = 'Invalid JSON in composer.json';
                                return;
                            }
                        }

                        // Parse package.json
                        if (this.packageJson.trim()) {
                            try {
                                const data = JSON.parse(this.packageJson);
                                const dep = data.dependencies || {};
                                const devDep = data.devDependencies || {};
                                for (const [name, version] of Object.entries(dep)) {
                                    npmEntries.push({
                                        name,
                                        required: version,
                                        dev: false,
                                    });
                                }
                                for (const [name, version] of Object.entries(devDep)) {
                                    npmEntries.push({
                                        name,
                                        required: version,
                                        dev: true,
                                    });
                                }
                            } catch {
                                this.error = 'Invalid JSON in package.json';
                                return;
                            }
                        }

                        if (!phpEntries.length && !npmEntries.length) {
                            this.error = 'No packages found. Make sure your JSON was added and has "require" or "dependencies" keys.';
                            return;
                        }

                        this.loading = true;
                        this.activeTab = phpEntries.length ? 'php' : 'npm';

                        // Init cards with loading state
                        this.phpPackages = phpEntries.map((e) => ({
                            ...e,
                            description: '',
                            version: '',
                            loading: true,
                        }));
                        this.npmPackages = npmEntries.map((e) => ({
                            ...e,
                            description: '',
                            version: '',
                            loading: true,
                        }));

                        const total = phpEntries.length + npmEntries.length;
                        let done = 0;

                        const bump = () => {
                            done++;
                            this.progress = Math.round((done / total) * 100);
                            this.statusMsg = `Fetching ${done} / ${total} packages...`;
                        };

                        // Fetch PHP packages from Packagist
                        const phpPromises = phpEntries.map(async (entry, i) => {
                            try {
                                const r = await fetch(`https://packagist.org/packages/${entry.name}.json`);
                                if (r.ok) {
                                    const data = await r.json();
                                    const pkg = data.package;

                                    if (pkg && this.phpPackages[i]) {
                                        this.phpPackages[i].description = pkg.description || '';
                                        const versions = Object.values(pkg.versions || {});
                                        this.phpPackages[i].version = versions[0]?.version || '';
                                        this.phpPackages[i].gitlab = pkg.repository || '';
                                    }
                                }
                            } catch {}

                            if (this.phpPackages[i]) {
                                this.phpPackages[i].loading = false;
                            }

                            bump();
                        });

                        // Fetch NPM packages from registry
                        const npmPromises = npmEntries.map(async (entry, i) => {
                            try {
                                const r = await fetch(`https://registry.npmjs.org/${entry.name}/latest`);
                                if (r.ok) {
                                    const data = await r.json();
                                    const repo = data.repository;

                                    this.npmPackages[i].gitlab = typeof repo === 'string' ? repo.replace('git+', '').replace('git:', 'https:').replace('.git', '') : repo?.url?.replace('git+', '').replace('git:', 'https:').replace('.git', '') || '';

                                    if (this.npmPackages[i]) {
                                        this.npmPackages[i].description = data.description || '';
                                        this.npmPackages[i].version = data.version || '';
                                    }
                                }
                            } catch {}

                            if (this.npmPackages[i]) {
                                this.npmPackages[i].loading = false;
                            }

                            bump();
                        });

                        await Promise.all([...phpPromises, ...npmPromises]);
                        this.loading = false;
                        this.progress = 100;
                    },
                }));
            });
        </script>
    </body>
</html>
